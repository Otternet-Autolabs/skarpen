(function(){const panel=document.getElementById('o6w3');const orig={log:console.log,warn:console.warn,error:console.error};function dbgLine(prefix,args){const line=document.createElement('div');line.style.color=prefix==='ERR'?'#f66':prefix==='WRN'?'#fa0':'#0f0';line.textContent=prefix+' '+Array.from(args).map(a=>typeof a==='object'?JSON.stringify(a):String(a)).join(' ');panel.appendChild(line);while(panel.children.length>60)panel.removeChild(panel.firstChild);const atBottom=panel.scrollHeight-panel.scrollTop-panel.clientHeight<40;if(atBottom)panel.scrollTop=panel.scrollHeight;}
