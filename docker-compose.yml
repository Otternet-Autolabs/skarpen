services:
  skarpen:
    build: .
    ports:
      - "8003:8003"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - skarpen_net
networks:
  skarpen_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.0.0/24
